<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Panel — StudyBank</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0f1a;--surface:#141828;--card:#1b2035;
  --border:#252d45;--accent:#6c63ff;--accent2:#ff6584;
  --text:#e8eaf6;--muted:#8892b0;--green:#10b981;--red:#ef4444;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
}
.login-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:40px;width:100%;max-width:380px;
  box-shadow:0 30px 80px rgba(0,0,0,.5);
}
.login-card h1{font-size:24px;font-weight:700;margin-bottom:6px;}
.login-card p{font-size:14px;color:var(--muted);margin-bottom:28px;}

/* ADMIN LAYOUT */
.admin-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:60px;
  background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.admin-nav .logo{font-size:18px;font-weight:700;}
.admin-nav .logo span{color:var(--accent);}
.admin-body{max-width:860px;margin:0 auto;padding:32px 24px 80px;}

/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:28px;border-bottom:1px solid var(--border);padding-bottom:0;}
.tab{
  padding:10px 22px;border-radius:10px 10px 0 0;
  background:none;border:none;color:var(--muted);
  font-size:14px;font-weight:600;cursor:pointer;
  font-family:'Outfit',sans-serif;transition:all .2s;
  border-bottom:2px solid transparent;margin-bottom:-1px;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(108,99,255,.06);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:600px){.form-grid{grid-template-columns:1fr;}}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
label{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
input,select,textarea{
  padding:11px 14px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);
  font-family:'Outfit',sans-serif;font-size:15px;outline:none;
  transition:border-color .2s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:130px;}
select option{background:var(--card);}

.section-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:28px;margin-bottom:20px;
}
.section-card h2{font-size:18px;font-weight:700;margin-bottom:20px;}

.btn{
  padding:12px 28px;border-radius:10px;border:none;
  font-family:'Outfit',sans-serif;font-size:15px;
  font-weight:600;cursor:pointer;transition:all .2s;
}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#5046e4;transform:translateY(-1px);}
.btn-danger{background:rgba(239,68,68,.12);color:var(--red);border:1.5px solid rgba(239,68,68,.25);}
.btn-danger:hover{background:var(--red);color:#fff;}
.btn-sm{padding:7px 14px;font-size:13px;}

/* ENTRY LIST */
.entry-list{display:flex;flex-direction:column;gap:10px;}
.entry-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:16px 20px;
  display:flex;align-items:flex-start;gap:14px;justify-content:space-between;
}
.entry-info .ei-q{font-size:14px;font-weight:500;margin-bottom:6px;}
.entry-info .ei-meta{font-size:12px;color:var(--muted);}
.entry-info .ei-ans{
  font-size:13px;color:var(--muted);margin-top:6px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}

/* STATUS */
.status{
  padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;
}
.status.success{background:rgba(16,185,129,.12);color:var(--green);}
.status.error{background:rgba(239,68,68,.12);color:var(--red);}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;
  padding:12px 20px;border-radius:12px;
  font-size:14px;font-weight:500;
  background:#1e293b;color:#fff;
  border-left:4px solid var(--green);
  opacity:0;transform:translateY(6px);
  transition:all .3s;z-index:999;
}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <h1>⚙ Admin Panel</h1>
    <p>Enter your password to manage answers</p>
    <div class="form-group" style="margin-bottom:16px;">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <div id="login-err" style="color:#ef4444;font-size:13px;margin-bottom:12px;display:none;">Wrong password!</div>
    <button class="btn btn-primary" style="width:100%" onclick="login()">Login →</button>
    <div style="margin-top:16px;font-size:12px;color:var(--muted);">Default password: <code style="color:var(--accent)">admin123</code> (change after login)</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" style="display:none;">
  <nav class="admin-nav">
    <div class="logo">Study<span>Bank</span> Admin</div>
    <div style="display:flex;gap:12px;align-items:center;">
      <a href="/" style="color:var(--muted);font-size:13px;text-decoration:none;">← View Site</a>
      <button class="btn btn-sm" style="background:var(--border);color:var(--muted);" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="admin-body">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('add')">➕ Add Answer</button>
      <button class="tab" onclick="switchTab('manage')">📋 Manage Entries</button>
      <button class="tab" onclick="switchTab('settings')">🔐 Settings</button>
    </div>

    <!-- ADD TAB -->
    <div class="tab-panel active" id="tab-add">
      <div class="section-card">
        <h2>Add New Q&A</h2>
        <div id="add-status"></div>
        <div class="form-grid">
          <div class="form-group">
            <label>Class *</label>
            <select id="f-class">
              <option value="">Select Class</option>
              <option value="9">Class 9</option>
              <option value="10">Class 10</option>
              <option value="11">Class 11</option>
              <option value="12">Class 12</option>
            </select>
          </div>
          <div class="form-group">
            <label>Board *</label>
            <select id="f-board">
              <option value="">Select Board</option>
              <option>CBSE</option>
              <option>Maharashtra Board</option>
            </select>
          </div>
          <div class="form-group">
            <label>Subject *</label>
            <select id="f-subject">
              <option value="">Select Subject</option>
              <option>Mathematics</option>
              <option>Physics</option>
              <option>Chemistry</option>
              <option>Biology</option>
              <option>English</option>
              <option>History</option>
              <option>Geography</option>
              <option>Economics</option>
              <option>Computer Science</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Chapter *</label>
            <input type="text" id="f-chapter" placeholder="e.g. 1 or Real Numbers"/>
          </div>
          <div class="form-group">
            <label>Exercise *</label>
            <input type="text" id="f-exercise" placeholder="e.g. Exercise 1.1"/>
          </div>
        </div>
        <div class="form-group full" style="margin-top:14px;">
          <label>Question *</label>
          <textarea id="f-question" placeholder="Type the full question here..."></textarea>
        </div>
        <div class="form-group full" style="margin-top:14px;">
          <label>Answer *</label>
          <textarea id="f-answer" style="min-height:180px;" placeholder="Type the complete answer here. You can use multiple lines."></textarea>
        </div>
        <button class="btn btn-primary" style="margin-top:20px;width:100%" onclick="addQA()">Save Answer →</button>
      </div>
    </div>

    <!-- MANAGE TAB -->
    <div class="tab-panel" id="tab-manage">
      <div class="section-card">
        <h2>All Entries</h2>
        <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
          <select id="filter-class" onchange="loadEntries()" style="padding:8px 12px;border-radius:8px;font-size:13px;background:var(--surface);border:1px solid var(--border);color:var(--text);">
            <option value="">All Classes</option>
            <option value="9">Class 9</option>
            <option value="10">Class 10</option>
            <option value="11">Class 11</option>
            <option value="12">Class 12</option>
          </select>
        </div>
        <div class="entry-list" id="entry-list">
          <div style="color:var(--muted);font-size:14px;text-align:center;padding:40px;">Loading...</div>
        </div>
      </div>
    </div>

    <!-- SETTINGS TAB -->
    <div class="tab-panel" id="tab-settings">
      <div class="section-card">
        <h2>Change Password</h2>
        <div class="form-group" style="margin-bottom:12px;">
          <label>Current Password</label>
          <input type="password" id="s-current" placeholder="Current password"/>
        </div>
        <div class="form-group" style="margin-bottom:12px;">
          <label>New Password</label>
          <input type="password" id="s-new" placeholder="New password"/>
        </div>
        <div class="form-group" style="margin-bottom:20px;">
          <label>Confirm New Password</label>
          <input type="password" id="s-confirm" placeholder="Confirm new password"/>
        </div>
        <div id="pass-status"></div>
        <button class="btn btn-primary" onclick="changePass()">Update Password</button>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let adminPass = '';

function showToast(msg, good=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderLeftColor = good ? '#10b981' : '#ef4444';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

async function login() {
  const pass = document.getElementById('login-pass').value;
  const res = await fetch('/api/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ password: pass })
  });
  if (res.ok) {
    adminPass = pass;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadEntries();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

function logout() {
  adminPass = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-panel').style.display = 'none';
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  event.target.classList.add('active');
  if (name === 'manage') loadEntries();
}

async function addQA() {
  const classId = document.getElementById('f-class').value;
  const board = document.getElementById('f-board').value;
  const subject = document.getElementById('f-subject').value;
  const chapter = document.getElementById('f-chapter').value.trim();
  const exercise = document.getElementById('f-exercise').value.trim();
  const question = document.getElementById('f-question').value.trim();
  const answer = document.getElementById('f-answer').value.trim();

  if (!classId||!board||!subject||!chapter||!exercise||!question||!answer) {
    showToast('⚠️ Please fill all fields!', false); return;
  }

  const res = await fetch('/api/admin/add', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ password: adminPass, classId, board, subject, chapter, exercise, question, answer })
  });

  if (res.ok) {
    showToast('✅ Answer saved successfully!');
    ['f-question','f-answer'].forEach(id => document.getElementById(id).value = '');
  } else {
    showToast('❌ Failed to save!', false);
  }
}

async function loadEntries() {
  const classFilter = document.getElementById('filter-class')?.value || '';
  let url = '/api/structure?';
  if (classFilter) url += `classId=${classFilter}`;
  // Just fetch all via search with empty wildcard isn't available — load all via search hack
  const res = await fetch(`/api/search?q=a&classId=${classFilter}`);
  // This is limited; let's use a proper endpoint
  // Actually use the search with common chars trick isn't reliable. Use full load:
  const r2 = await fetch(`/api/search?q=the&classId=${classFilter}`);
  // For now let's provide full list from structure approach
  renderEntries(await fetchAllEntries(classFilter));
}

async function fetchAllEntries(classFilter='') {
  // Get all classes first, then drill down - simple approach: search with empty queries
  // We'll use a small admin endpoint workaround via the regular search with very common letter
  const letters = ['a','e','i','o','the','is','of',''];
  const seen = new Set();
  const all = [];
  for (const l of letters) {
    const res = await fetch(`/api/search?q=${l}&classId=${classFilter}`);
    const items = await res.json();
    items.forEach(i => { if(!seen.has(i.id)) { seen.add(i.id); all.push(i); } });
  }
  return all;
}

function renderEntries(items) {
  const list = document.getElementById('entry-list');
  if (!items.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:14px;text-align:center;padding:40px;">No entries yet.</div>';
    return;
  }
  list.innerHTML = items.map(i => `
    <div class="entry-item" id="entry-${i.id}">
      <div class="entry-info">
        <div class="ei-q">${i.question}</div>
        <div class="ei-meta">Class ${i.class} · ${i.board} · ${i.subject} · Ch.${i.chapter} · ${i.exercise}</div>
        ${i.answer ? `<div class="ei-ans">${i.answer}</div>` : ''}
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteEntry('${i.id}')">🗑 Delete</button>
    </div>`).join('');
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  const res = await fetch(`/api/admin/delete/${id}`, {
    method:'DELETE', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ password: adminPass })
  });
  if (res.ok) {
    document.getElementById(`entry-${id}`)?.remove();
    showToast('🗑 Deleted!');
  } else showToast('❌ Failed to delete', false);
}

async function changePass() {
  const current = document.getElementById('s-current').value;
  const newP = document.getElementById('s-new').value;
  const confirm = document.getElementById('s-confirm').value;
  if (newP !== confirm) { showToast('❌ Passwords do not match!', false); return; }
  const res = await fetch('/api/admin/changepass', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ password: current, newPassword: newP })
  });
  if (res.ok) {
    adminPass = newP;
    showToast('✅ Password updated!');
    ['s-current','s-new','s-confirm'].forEach(id => document.getElementById(id).value = '');
  } else showToast('❌ Wrong current password!', false);
}
</script>
</body>
</html>
